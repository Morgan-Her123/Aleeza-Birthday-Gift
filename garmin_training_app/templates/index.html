<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runners Log - Sessions</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h1 class="app-title">Runners Log</h1>
      <nav class="side-nav">
        <a class="side-link" href="/">Home</a>
        <a class="side-link active" href="/sessions">Sessions</a>
        <a class="side-link" href="/overview">Overall Performance</a>
      </nav>
    </aside>

    <main class="page-content">
      <div class="layout">
        <section class="panel controls">
          <h2>Training Sessions</h2>
          <p class="sub">Connect watch and import activities into Runners Log.</p>

          <label for="watchPath">Watch Activity Folder</label>
          <input id="watchPath" type="text" value="{{ default_watch_path }}" />

          <button id="importBtn">Import From Connected Watch</button>
          <p id="status" class="status"></p>
        </section>

        <section class="panel list">
          <h2>Session List</h2>
          <table id="activityTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Sport</th>
                <th>Miles</th>
                <th>Avg Pace</th>
                <th>Avg HR</th>
                <th>Ascent</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>

        <section class="panel details">
          <h2>Session Details</h2>
          <p class="sub">Click a running record row to load this panel.</p>
          <div id="detailCards" class="cards"></div>
          <div id="sessionExtra" class="session-extra"></div>
          <div class="plot-wrap">
            <img id="plotImage" alt="Activity graphs" />
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>

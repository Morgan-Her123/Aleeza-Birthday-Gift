<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runners Log - Overall Improvement</title>
  <link rel="stylesheet" href="/static/style.css?v=20260408b" />
</head>
<body>
  <header class="topbar">
    <button id="menuBtn" class="menu-btn" aria-label="Open sidebar">
      <span></span><span></span><span></span>
    </button>
    <h1>Overall Improvement</h1>
  </header>

  <div id="overlay" class="overlay"></div>
  <aside id="sidebar" class="drawer">
    <h2>Menu</h2>
    <nav class="drawer-nav">
      <a class="drawer-link" href="/">Home</a>
      <a class="drawer-link" href="/records">Records</a>
      <a class="drawer-link active" href="/overview">Overall Improvement</a>
      <a class="drawer-link" href="/planner">Metric Calendar</a>
      <a class="drawer-link" href="/goals">Goals</a>
    </nav>
  </aside>

  <main class="content">
    <section class="panel">
      <h2>Overall Performance</h2>
      <p class="sub">Long-term training trends from your imported Garmin records.</p>
      <div id="overviewStats" class="cards"></div>
    </section>

    <section class="panel">
      <h2>Distance Per Session</h2>
      <canvas id="distanceChart" class="chart-fixed-size" height="260"></canvas>
    </section>

    <section class="panel">
      <h2>Average Pace Per Session</h2>
      <canvas id="paceChart" class="chart-fixed-size" height="260"></canvas>
    </section>

    <section class="panel">
      <h2>Average Heart Rate Per Session</h2>
      <canvas id="hrChart" class="chart-fixed-size" height="260"></canvas>
    </section>

    <section class="panel">
      <h2>7-Session Rolling Distance</h2>
      <canvas id="rollingChart" class="chart-fixed-size" height="260"></canvas>
    </section>
  </main>

  <script src="/static/common.js?v=20260408b"></script>
  <script src="/static/overview.js?v=20260408b"></script>
</body>
</html>

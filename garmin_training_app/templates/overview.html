<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runners Log - Overall Performance</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h1 class="app-title">Runners Log</h1>
      <nav class="side-nav">
        <a class="side-link" href="/">Home</a>
        <a class="side-link" href="/sessions">Sessions</a>
        <a class="side-link active" href="/overview">Overall Performance</a>
      </nav>
    </aside>

    <main class="page-content">
      <div class="overview-layout">
        <section class="panel">
          <h2>Overall Performance</h2>
          <p class="sub">Long-term training trends from your imported Garmin records.</p>
          <div id="overviewStats" class="cards"></div>
        </section>

        <section class="panel">
          <h2>Distance Per Session</h2>
          <canvas id="distanceChart" height="260"></canvas>
        </section>

        <section class="panel">
          <h2>Average Pace Per Session</h2>
          <canvas id="paceChart" height="260"></canvas>
        </section>

        <section class="panel">
          <h2>Average Heart Rate Per Session</h2>
          <canvas id="hrChart" height="260"></canvas>
        </section>

        <section class="panel">
          <h2>7-Session Rolling Distance</h2>
          <canvas id="rollingChart" height="260"></canvas>
        </section>
      </div>
    </main>
  </div>

  <script src="/static/overview.js"></script>
</body>
</html>

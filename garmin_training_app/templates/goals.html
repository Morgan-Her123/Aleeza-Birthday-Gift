<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runners Log - Goals</title>
  <link rel="stylesheet" href="/static/style.css?v=20260502a" />
</head>
<body>
  <header class="topbar">
    <button id="menuBtn" class="menu-btn" aria-label="Open sidebar">
      <span></span><span></span><span></span>
    </button>
    <h1>Goals</h1>
  </header>

  <div id="overlay" class="overlay"></div>
  <aside id="sidebar" class="drawer">
    <h2>Menu</h2>
    <nav class="drawer-nav">
      <a class="drawer-link" href="/">Home</a>
      <a class="drawer-link" href="/records">Records</a>
      <a class="drawer-link" href="/overview">Overall Improvement</a>
      <a class="drawer-link" href="/planner">Metric Calendar</a>
      <a class="drawer-link active" href="/goals">Goals</a>
    </nav>
  </aside>

  <main class="content">
    <section class="panel">
      <h2>Add Goal</h2>
      <p class="sub">Weekly goal: completion date, target hours, target miles, target vertical gain. Final goal: target time, target event, and target date.</p>
      <form id="goalForm" class="planner-form">
        <div>
          <label for="goalType">Goal Type</label>
          <select id="goalType">
            <option value="weekly" selected>Weekly Goal</option>
            <option value="final">Final Goal</option>
          </select>
        </div>
        <div id="goalTitleWrap">
          <label for="goalTitle">Goal Name</label>
          <input id="goalTitle" type="text" placeholder="Example: Marathon goal" />
        </div>
        <div id="weeklyWrap">
          <label for="weeklyCompletionDate">Completion Date</label>
          <input id="weeklyCompletionDate" type="date" />
        </div>
        <div id="weeklyHoursWrap">
          <label for="weeklyTargetHours">Target Hours Trained</label>
          <input id="weeklyTargetHours" type="text" placeholder="Example: 6" />
        </div>
        <div id="weeklyMilesWrap">
          <label for="weeklyTargetMiles">Target Amount Of Miles</label>
          <input id="weeklyTargetMiles" type="text" placeholder="Example: 30" />
        </div>
        <div id="weeklyGainWrap">
          <label for="weeklyTargetGain">Target Amount Of Vertical Gain (ft)</label>
          <input id="weeklyTargetGain" type="text" placeholder="Example: 2500" />
        </div>
        <div id="weeklyChangeWrap">
          <label for="weeklyPercentChange">Percent Change Vs Previous Week (%)</label>
          <input id="weeklyPercentChange" type="text" placeholder="Example: +8 or -5" />
        </div>
        <div id="weeklyRaceWrap">
          <label for="weeklyRaceGoal">Race Goal (Weekly)</label>
          <input id="weeklyRaceGoal" type="text" placeholder="Example: 10K race effort on Saturday" />
        </div>
        <div id="finalTimeWrap" style="display:none;">
          <label for="finalTargetTime">Final Target Time</label>
          <input id="finalTargetTime" type="text" placeholder="Example: 3:45:00" />
        </div>
        <div id="finalEventWrap" style="display:none;">
          <label for="finalTargetEvent">Final Target Event</label>
          <input id="finalTargetEvent" type="text" placeholder="Example: City Marathon" />
        </div>
        <div id="finalDateWrap" style="display:none;">
          <label for="finalTargetDate">Final Target Date</label>
          <input id="finalTargetDate" type="date" />
        </div>
        <div>
          <label for="goalNotes">Notes</label>
          <textarea id="goalNotes" rows="2" placeholder="Extra details..."></textarea>
        </div>
        <button type="submit">Save Goal</button>
      </form>
      <p id="goalStatus" class="status"></p>
    </section>

    <section class="panel">
      <h2>Weekly Goals</h2>
      <div id="weeklyGoals" class="cards"></div>
    </section>

    <section class="panel">
      <h2>Final Goal</h2>
      <div id="finalGoals" class="cards"></div>
    </section>
  </main>

  <script src="/static/common.js?v=20260502a"></script>
  <script src="/static/goals.js?v=20260502a"></script>
</body>
</html>
